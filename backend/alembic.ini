# alembic.ini
# -----------
# Alembic reads DATABASE_URL from env at runtime (see app/migrations/env.py).
# The sqlalchemy.url value here is intentionally a placeholder — it is
# overridden in env.py by the value from app/config.py.

[alembic]
script_location = app/migrations
prepend_sys_path = .
version_path_separator = os  # os uses os.pathsep
sqlalchemy.url = postgresql://placeholder

[post_write_hooks]
# (none)

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S